name: Check Music Releases

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:         # lets you trigger it manually from GitHub

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore seen releases cache
        uses: actions/cache@v4
        with:
          path: seen_releases.json
          key: seen-releases-${{ github.run_id }}
          restore-keys: seen-releases-

      - name: Install dependencies
        run: npm install

      - name: Run bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: node index.js

      - name: Save seen releases cache
        uses: actions/cache/save@v4
        with:
          path: seen_releases.json
          key: seen-releases-${{ github.run_id }}
